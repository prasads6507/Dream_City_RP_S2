services:
  - type: web
    name: dream-city-bot-server
    env: docker
    rootDir: server # Points to the server subdirectory
    plan: free
    region: oregon 
    buildFilter:
      paths:
        - server/**
    envVars:
      - key: PORT
        value: 5000
      - key: DISCORD_BOT_TOKEN
        sync: false # Set this in Render dashboard
      - key: DISCORD_GUILD_ID
        sync: false # Set this in Render dashboard
      - key: DISCORD_ROLE_ID
        value: 1493620549883003031
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        value: ./firebase-admin.json
